<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rocket Engineers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="appHeader">
      <div class="brandCluster">
        <div class="cloudLogo">Rocket Engineers</div>
      </div>
      <nav class="topNav" aria-label="Primary navigation">
        <a href="#" data-nav-tab="home">Home</a>
        <a href="#" class="active" data-nav-tab="providers">Providers</a>
      </nav>
      <div class="headerActions">
        <span id="status" hidden>Loading profiles</span>
      </div>
    </header>

    <section class="searchHero">
      <div>
        <h1>Explore Providers by Business Need</h1>
        <p>Find cloud, DevOps, platform, and software partners using generated profile evidence.</p>
      </div>
      <label class="heroSearch">
        <span>Search Rocket Engineers</span>
        <input id="searchInput" type="search" placeholder="Search providers, services, technologies, partners" />
      </label>
    </section>

    <section id="homePage" class="homePage" hidden></section>

    <main id="providersPage" class="marketplace">
      <button id="filterDrawerButton" class="filterDrawerButton" type="button" aria-expanded="false" aria-controls="filterDrawer">Filters</button>

      <aside id="filterDrawer" class="discoveryRail" aria-label="Explore and filters">
        <div class="filterDrawerHeader">
          <strong>Filters</strong>
          <button id="filterDrawerClose" type="button">Close</button>
        </div>
        <div class="filterSearch">
          <span>Find</span>
          <input id="filterSearchInput" type="search" placeholder="Search filters..." />
        </div>

        <div class="filterGroup">
          <div class="filterGroupHeader" data-filter-group-header>
            <h2><button class="filterGroupToggle" type="button" data-toggle-filter-group aria-expanded="true">Country</button></h2>
            <button type="button" data-clear-filter="country">Clear</button>
          </div>
          <input class="filterOptionSearch" type="search" placeholder="Search countries" data-filter-search="country" />
          <div id="countryFilter" class="filterOptionList" data-filter-key="country"></div>
        </div>

        <div class="filterGroup">
          <div class="filterGroupHeader" data-filter-group-header>
            <h2><button class="filterGroupToggle" type="button" data-toggle-filter-group aria-expanded="true">Service</button></h2>
            <button type="button" data-clear-filter="service">Clear</button>
          </div>
          <input class="filterOptionSearch" type="search" placeholder="Search services" data-filter-search="service" />
          <div id="serviceFilter" class="filterOptionList" data-filter-key="service"></div>
        </div>

        <div class="filterGroup">
          <div class="filterGroupHeader" data-filter-group-header>
            <h2><button class="filterGroupToggle" type="button" data-toggle-filter-group aria-expanded="true">Technology</button></h2>
            <button type="button" data-clear-filter="technology">Clear</button>
          </div>
          <input class="filterOptionSearch" type="search" placeholder="Search technologies" data-filter-search="technology" />
          <div id="technologyFilter" class="filterOptionList" data-filter-key="technology"></div>
        </div>

        <div class="filterGroup">
          <div class="filterGroupHeader" data-filter-group-header>
            <h2><button class="filterGroupToggle" type="button" data-toggle-filter-group aria-expanded="true">Vendor Partner</button></h2>
            <button type="button" data-clear-filter="partner">Clear</button>
          </div>
          <input class="filterOptionSearch" type="search" placeholder="Search partners" data-filter-search="partner" />
          <div id="partnerFilter" class="filterOptionList" data-filter-key="partner"></div>
        </div>

        <div class="filterGroup">
          <div class="filterGroupHeader" data-filter-group-header>
            <h2><button class="filterGroupToggle" type="button" data-toggle-filter-group aria-expanded="true">Industries</button></h2>
            <button type="button" data-clear-filter="industry">Clear</button>
          </div>
          <input class="filterOptionSearch" type="search" placeholder="Search industries" data-filter-search="industry" />
          <div id="industryFilter" class="filterOptionList" data-filter-key="industry"></div>
        </div>

        <button id="resetButton" class="advancedButton" type="button">Show All Providers</button>
      </aside>

      <section class="listingArea" aria-label="Company profiles">
        <section class="detail" aria-label="Profile detail" hidden>
          <div id="detailContent" class="detailContent empty">
            Select a provider card to view profile details.
          </div>
        </section>

        <div id="activeFilters" class="activeFilters" hidden></div>
        <div id="profileList" class="profileList"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
